name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: doctobook
          POSTGRES_USER: doctobook
          POSTGRES_PASSWORD: doctobook
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U doctobook -d doctobook"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://doctobook:doctobook@localhost:5432/doctobook?schema=public
      REDIS_URL: redis://localhost:6379
      JWT_ACCESS_TOKEN_SECRET: ci-access-secret
      JWT_REFRESH_TOKEN_SECRET: ci-refresh-secret
      ENCRYPTION_KEY: ci-encryption-key
      NEXT_PUBLIC_API_URL: http://localhost:4000
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
