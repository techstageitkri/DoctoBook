# DoctoBook production reverse proxy template.
# Replace doctobook.example.com and TLS paths before enabling.

map $http_upgrade $connection_upgrade {
    default upgrade;
    "" close;
}

limit_req_zone $binary_remote_addr zone=doctobook_api:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=doctobook_auth:10m rate=2r/s;
limit_req_zone $binary_remote_addr zone=doctobook_webhook:10m rate=5r/s;

upstream doctobook_web {
    server 127.0.0.1:3002;
    keepalive 32;
}

upstream doctobook_api {
    server 127.0.0.1:4001;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name doctobook.example.com;

    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name doctobook.example.com;

    ssl_certificate /etc/letsencrypt/live/doctobook.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/doctobook.example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 1m;
    keepalive_timeout 65;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Request-ID $request_id;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    location ^~ /v1/auth/ {
        limit_req zone=doctobook_auth burst=20 nodelay;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
        proxy_buffering off;
        add_header Cache-Control "no-store" always;
        proxy_pass http://doctobook_api;
    }

    location ^~ /v1/payments/webhooks/ {
        client_max_body_size 256k;
        limit_req zone=doctobook_webhook burst=30 nodelay;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
        proxy_buffering off;
        add_header Cache-Control "no-store" always;
        proxy_pass http://doctobook_api;
    }

    location ^~ /v1/ {
        limit_req zone=doctobook_api burst=60 nodelay;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_buffering off;
        add_header Cache-Control "no-store" always;
        proxy_pass http://doctobook_api;
    }

    location ^~ /health {
        access_log off;
        proxy_read_timeout 10s;
        proxy_send_timeout 10s;
        proxy_pass http://doctobook_api;
    }

    location ^~ /_next/static/ {
        proxy_read_timeout 60s;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        proxy_pass http://doctobook_web;
    }

    location / {
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_pass http://doctobook_web;
    }
}
